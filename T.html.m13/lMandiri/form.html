<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran Ekstrakulikuler</title>
</head>
<body>
    <h1 align="center" ><b>Pendaftaran Ekstrakulikuler</b></h1>
    <hr>

    <form action="prosesForm.php" method="post" name="input">
        <table>
            <tr>
                <td>
                    Nis :
                </td>
                <td>
                    <input type="text" name="nis" id="">
                </td>
            </tr>
            <tr>
                <td>
                    Nama :
                </td>
                <td>
                    <input type="text" name="nama" id="">
                </td>
            </tr>
            <tr>
                <td>
                    Kelas :
                </td>
                <td>
                    <select name="kelas" id="">
                        <option value="X">X</option>
                        <option value="XI">XI</option>
                        <option value="XII">XII</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    Tgl Lahir :
                </td>
                <td>
                    <input type="date" name="tglLahir" id="">
                </td>
            </tr>
            <tr>
                <td>
                    Alamat :
                </td>
                <td>
                    <textarea name="alamat" id="" cols="40" rows="5"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    Kota :
                </td>
                <td>
                    <input type="text" name="kota" id="">
                </td>
            </tr>
            <tr>
                <td>
                    Jenis Kelammin :
                </td>
                <td>
                    <input type="radio" name="Kelamin" value="Laki-laki">Laki-laki
                    <input type="radio" name="Kelamin" value="Perempuan">Perempuan
                </td>
            </tr>
            <tr>
                <td>
                    Hobby :
                </td>
                <td>
                    <input type="checkbox" name="hobby1[]" value="Membaca">Membaca <br>
                    <input type="checkbox" name="hobby2[]" value="Menulis">Menulis <br>
                    <input type="checkbox" name="hobby3[]" value="Olahraga">Olahraga <br>
                    <input type="checkbox" name="hobby4[]" value="Musik">Musik <br>
                    <input type="checkbox" name="hobby5[]" value="Seni">Seni
                </td>
            </tr>
            <tr>
                <td>
                    Pilihan Ekskul :
                </td>
                <td>
                    <select name="ekskul" id="" size="7" >
                        <option value="Pramuka">Pramuka</option>
                        <option value="paskibra">Paskibra</option>
                        <option value="pmr">PMR</option>
                        <option value="bc">BC</option>
                        <option value="robotik">Robotik</option>
                        <option value="musik">Musik</option>
                    </select>
                </td>
            </tr>
        </table>
        <input type="submit" value="Kirim" name="kirim">
        <input type="reset" value="Reset" name="reset">
    </form>
    <font color="red">*</font>Harus Di Isi
</body>
</html>
